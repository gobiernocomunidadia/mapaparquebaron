<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interactivo CGM Parque Baron</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-main: #19567C;
            --blanco: #FFFFFF;
            --acento: #4AB5E0;
            --magenta: #D34872;
            --azul-inst: #19567C;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-main); color: var(--blanco); margin: 0; min-height: 100vh; }
        
        #map { height: 100%; width: 100%; border-radius: 8px; background-color: #f8fafc; z-index: 10; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F3F6F9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E6EDF3; border-radius: 4px; }

        /* Estilización de Popups de Leaflet para mantener el diseño limpio */
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .leaflet-popup-content {
            margin: 14px;
            font-family: 'Montserrat', sans-serif;
        }
        .custom-leaflet-icon {
            background: transparent;
            border: none;
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="bg-[var(--bg-main)] shadow-lg border-b-4 border-[var(--acento)] z-20 py-6 px-4 shrink-0">
        <div class="max-w-[1600px] mx-auto flex items-center justify-center gap-4">
            <div class="bg-white text-[var(--bg-main)] rounded-full h-14 w-14 flex items-center justify-center shadow-md">
                <i class="fa-solid fa-car text-2xl"></i>
            </div>
            <div class="flex flex-col">
                <h1 class="text-3xl font-extrabold tracking-tight uppercase leading-none">Mapa Interactivo CGM Parque Baron</h1>
            </div>
        </div>
    </header>

    <main class="w-full max-w-[1600px] mx-auto py-8 px-4 flex-1 flex flex-col lg:flex-row gap-6">
        
        <aside class="w-full lg:w-80 bg-white rounded-xl shadow-md border border-[#E6EDF3] flex flex-col max-h-[calc(100vh-200px)] overflow-hidden shrink-0 z-20">
            <div class="p-4 border-b bg-[#F3F6F9] flex items-center gap-2">
                <i data-lucide="filter" class="text-[#0B5F8D] h-5 w-5"></i>
                <h3 class="font-bold text-[#0F172A] uppercase text-sm">Filtros Operativos</h3>
            </div>
            
            <div class="p-5 overflow-y-auto custom-scrollbar flex-1 space-y-6">

                <!-- DIVISIÓN TERRITORIAL -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="map" class="h-4 w-4"></i> División Territorial
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-limite" checked class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Límite Lomas de Zamora</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-limite-cgm" checked class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Límites CGM</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-barrios-populares" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Barrios Populares</span>
                        </label>
                    </div>
                </div>

                <!-- DEMOGRAFÍA Y ZONIFICACIÓN -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="pie-chart" class="h-4 w-4"></i> Demografía y Zonificación
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-poblacion" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Población (Radios Censales)</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-pobreza" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Pobreza Crónica</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-inundables" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Zonas Inundables</span>
                        </label>
                    </div>
                </div>

                <!-- INSTITUCIONES -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="building-2" class="h-4 w-4"></i> Instituciones
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-asoc-civiles" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Asociaciones Civiles</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-jubilados" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Centros de Jubilados</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-culturales" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Centros Culturales</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-clubes" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Clubes Deportivos</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-comedores" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Comedores</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-educacion" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Establecimientos Educativos</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-fundaciones" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Fundaciones</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-iglesias" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Iglesias</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-salud" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Salud / C.A.P.S.</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-fomento" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Sociedades de Fomento</span>
                        </label>
                    </div>
                </div>

                <!-- INFRAESTRUCTURA VIAL -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="cone" class="h-4 w-4"></i> Infraestructura Vial
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-semaforos" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Semáforos Activos</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-reductores" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Reductores de Velocidad</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-solicitudes" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Solicitudes Semáforos 2026</span>
                        </label>
                    </div>
                </div>

                <!-- SEGURIDAD -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="shield-alert" class="h-4 w-4"></i> Seguridad
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-camaras" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Cámaras de Seguridad</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-alarmas" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Alarmas Comunitarias</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-comisarias" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Comisarías</span>
                        </label>
                    </div>
                </div>

            </div>
        </aside>

        <div class="flex-1 bg-white p-2 rounded-xl shadow-lg border border-[#E6EDF3] flex flex-col min-h-[500px] relative z-10">
            <div id="map"></div>
        </div>

    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        let map;
        let cgmBoundsCache = null; // Guardar los límites del CGM para el zoom
        let limiteCgmLayerObj = null;

        // Variables de Capas
        let limiteElements, limiteCgmLayer, barriosPopularesLayer;
        let poblacionLayer, pobrezaLayer, inundablesLayer;
        let semaforosLayer, reductoresLayer, solicitudesLayer;
        let camarasLayer, alarmasLayer, comisariasLayer;
        let asocCivilesLayer, jubiladosLayer, culturalesLayer, clubesLayer, comedoresLayer, 
            educacionLayer, fundacionesLayer, iglesiasLayer, saludLayer, fomentoLayer;

        function initMap() {
            lucide.createIcons();
            
            // Inicialización de Leaflet
            map = L.map('map').setView([-34.7573, -58.4035], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            // Inicialización de Grupos de Capas
            limiteElements = L.layerGroup().addTo(map);
            limiteCgmLayer = L.layerGroup().addTo(map);
            barriosPopularesLayer = L.layerGroup();
            
            poblacionLayer = L.layerGroup();
            pobrezaLayer = L.layerGroup();
            inundablesLayer = L.layerGroup();

            semaforosLayer = L.layerGroup();
            reductoresLayer = L.layerGroup();
            solicitudesLayer = L.layerGroup();

            camarasLayer = L.layerGroup();
            alarmasLayer = L.layerGroup();
            comisariasLayer = L.layerGroup();

            asocCivilesLayer = L.layerGroup();
            jubiladosLayer = L.layerGroup();
            culturalesLayer = L.layerGroup();
            clubesLayer = L.layerGroup();
            comedoresLayer = L.layerGroup();
            educacionLayer = L.layerGroup();
            fundacionesLayer = L.layerGroup();
            iglesiasLayer = L.layerGroup();
            saludLayer = L.layerGroup();
            fomentoLayer = L.layerGroup();

            // FUNCIÓN PARA ENCUADRAR LOS LÍMITES DEL CGM PARQUE BARON
            window.zoomToCgmBounds = function() {
                if (!cgmBoundsCache && limiteCgmLayerObj) {
                    cgmBoundsCache = limiteCgmLayerObj.getBounds();
                }
                if (cgmBoundsCache && cgmBoundsCache.isValid()) {
                    map.flyToBounds(cgmBoundsCache, { padding: [40, 40], duration: 0.5 });
                }
            };

            // -----------------------------------------------------
            // CARGA DE CAPAS GEOGRÁFICAS BÁSICAS
            // -----------------------------------------------------
            
            fetch('./municipios_Lomas de Zamora.geojson').then(r => r.json()).then(data => {
                L.geoJSON(data, {
                    style: { color: '#19567C', weight: 3, dashArray: '5, 5', fillOpacity: 0.03 }
                }).addTo(limiteElements);
            }).catch(e => console.log('Error loading Límite Lomas:', e));

            fetch('./cgm_Parque Baron.geojson').then(r => r.json()).then(data => {
                limiteCgmLayerObj = L.geoJSON(data, {
                    style: { fillColor: '#4AB5E0', fillOpacity: 0.15, color: '#19567C', weight: 2 }
                }).addTo(limiteCgmLayer);
                
                // Set bounds cache ready
                cgmBoundsCache = limiteCgmLayerObj.getBounds();
            }).catch(e => console.log('Error loading Límite CGM:', e));

            fetch('./barrios_cgm_Parque Baron.geojson').then(r => r.json()).then(data => {
                L.geoJSON(data, {
                    style: { fillColor: '#D34872', fillOpacity: 0.4, color: '#D34872', weight: 2 },
                    onEachFeature: function(feature, layer) {
                        const props = feature.properties;
                        const nombre = props.NOMBRE_BAR || 'Barrio Popular';
                        let content = `<div class="font-sans min-w-[220px]">
                            <h3 style="font-weight: 800; font-size: 14px; color: #D34872; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px;">${nombre}</h3>
                            <p style="margin: 4px 0; font-size: 12px; color: #333;"><span style="background:#F3F6F9; padding:2px 6px; border-radius:4px; font-weight:bold; color:#19567C; font-size:10px;">ID RENABAP: ${props.ID_RENABAP || '-'}</span></p>
                            <p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Clasificación:</b> ${props.CLASIFICAC || '-'}</p>
                            <p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Familias:</b> ${props.FAMILIAS || '-'}</p>
                            <p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Creación:</b> ${props.DECADA_CRE || '-'}</p>
                            <div style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed #E6EDF3;">
                                <p style="margin: 2px 0; font-size: 10px; color: #64748B;"><b>Agua:</b> ${props.AGUA || 'S/D'}</p>
                                <p style="margin: 2px 0; font-size: 10px; color: #64748B;"><b>Cloacas:</b> ${props.CLOACAS || 'S/D'}</p>
                                <p style="margin: 2px 0; font-size: 10px; color: #64748B;"><b>Luz:</b> ${props.ELECTRICID || 'S/D'}</p>
                            </div></div>`;
                        layer.bindPopup(content);
                        layer.on('click', zoomToCgmBounds);
                    }
                }).addTo(barriosPopularesLayer);
            }).catch(e => console.log('Error loading Barrios Populares:', e));

            // -----------------------------------------------------
            // CAPAS DEMOGRÁFICAS Y DE ZONIFICACIÓN
            // -----------------------------------------------------
            
            fetch('./poblacion_cgm_Parque Baron.geojson').then(r => r.json()).then(data => {
                let maxVal = 0;
                data.features.forEach(f => {
                    let val = parseInt(f.properties['Habitantes'] || f.properties['RADIOS_POB']) || 0;
                    if (val > maxVal) maxVal = val;
                });
                
                L.geoJSON(data, {
                    style: function(feature) {
                        let val = parseInt(feature.properties['Habitantes'] || feature.properties['RADIOS_POB']) || 0;
                        let color = '#D1E1F0';
                        if (maxVal > 0) {
                            if (val > maxVal * 0.8) color = '#084A6F';
                            else if (val > maxVal * 0.4) color = '#2A7FA8';
                        }
                        return { fillColor: color, fillOpacity: 0.7, color: '#FFFFFF', weight: 1 };
                    },
                    onEachFeature: function(feature, layer) {
                        let props = feature.properties;
                        let radioStr = props.REDCODE || props.RADIO || props.LINK_RADIO || props.NOMBRE || "Radio Censal";
                        let valHabitantes = props.Habitantes || props.RADIOS_POB || 0;
                        let valHogares = props.RADIOS_HOG || props.HOGARES;

                        let content = `
                            <div class="font-sans min-w-[200px]">
                                <h4 class="font-bold text-[#0B5F8D] border-b border-[#E6EDF3] pb-1 mb-2">Sector / Radio: ${radioStr}</h4>
                                <div class="bg-[#EAF1F7] p-2 rounded-md mb-2 border border-[#D1E1F0]">
                                    <p class="text-xs font-bold text-[#0B5F8D] uppercase">Total Habitantes</p>
                                    <p class="text-xl font-extrabold text-[#0B5F8D]">${Number(valHabitantes).toLocaleString('es-AR')}</p>
                                </div>`;
                        
                        if (valHogares !== undefined && valHogares !== null) {
                            content += `<ul class="text-xs text-[#64748B] space-y-1 mt-1"><li><b class="capitalize text-[#0F172A]">Cantidad de Hogares:</b> ${Number(valHogares).toLocaleString('es-AR')}</li></ul>`;
                        }
                        content += `</div>`;

                        layer.bindPopup(content);
                        layer.on('click', zoomToCgmBounds);
                    }
                }).addTo(poblacionLayer);
            }).catch(e => console.log('Error loading poblacion:', e));

            fetch('./pobreza_cronica_cgm_Parque Baron.geojson').then(r => r.json()).then(data => {
                let maxVal = 0;
                data.features.forEach(f => {
                    let val = parseFloat(f.properties['P_PC_PER']) || 0;
                    if (val > maxVal) maxVal = val;
                });
                L.geoJSON(data, {
                    style: function(feature) {
                        let pct = parseFloat(feature.properties['P_PC_PER']) || 0;
                        let color = '#D1E1F0';
                        if(maxVal > 0) {
                            if (pct >= 15) color = '#084A6F';
                            else if (pct >= 5) color = '#2A7FA8';
                        }
                        return { fillColor: color, fillOpacity: 0.85, color: '#FFFFFF', weight: 2 };
                    },
                    onEachFeature: function(feature, layer) {
                        let props = feature.properties;
                        let radioStr = props.LINK_RADIO || "Radio Censal";
                        let pct = props.P_PC_PER || 0;

                        let content = `
                            <div class="font-sans min-w-[200px]">
                                <h4 class="font-bold text-[#19567C] border-b border-[#E6EDF3] pb-1 mb-2">Pobreza Crónica - Radio: ${radioStr}</h4>
                                <div class="bg-[#EAF1F7] p-2 rounded-md mb-2 border border-[#D1E1F0]">
                                    <p class="text-xs font-bold text-[#0B5F8D] uppercase">% Pobreza Crónica</p>
                                    <p class="text-xl font-extrabold text-[#19567C]">${pct}%</p>
                                </div>
                                <ul class="text-xs text-[#64748B] space-y-1 mt-1">
                                    <li><b class="capitalize text-[#0F172A]">Población:</b> ${Number(props.POBLACION || 0).toLocaleString('es-AR')}</li>
                                    <li><b class="capitalize text-[#0F172A]">Hogares:</b> ${Number(props.N_HOGARES || 0).toLocaleString('es-AR')}</li>
                                    <li><b class="capitalize text-[#0F172A]">Personas afectadas:</b> ${Number(props.PC_PER || 0).toLocaleString('es-AR')}</li>
                                </ul>
                            </div>`;

                        layer.bindPopup(content);
                        layer.on('click', zoomToCgmBounds);
                    }
                }).addTo(pobrezaLayer);
            }).catch(e => console.log('Error loading pobreza:', e));

            fetch('./zonas_inundables_cgm_Parque Baron.geojson').then(r => r.json()).then(data => {
                let maxVal = 0;
                data.features.forEach(f => {
                    let val = parseFloat(f.properties['PORCENTAJE']) || 0;
                    if (val > maxVal) maxVal = val;
                });
                L.geoJSON(data, {
                    style: function(feature) {
                        let pct = parseFloat(feature.properties['PORCENTAJE']) || 0;
                        let color = '#38BDF8';
                        if(maxVal > 0) {
                            if (pct >= 70) color = '#DC2626';
                            else if (pct >= 30) color = '#9333EA';
                        }
                        return { fillColor: color, fillOpacity: 0.7, color: '#FFFFFF', weight: 1 };
                    },
                    onEachFeature: function(feature, layer) {
                        let props = feature.properties;
                        let radioStr = props.CODIGO_DE_ || "Radio Censal";
                        let pct = props.PORCENTAJE || 0;

                        let content = `
                            <div class="font-sans min-w-[200px]">
                                <h4 class="font-bold text-[#06B6D4] border-b border-[#E6EDF3] pb-1 mb-2">Zonas Inundables - Radio: ${radioStr}</h4>
                                <div class="bg-[#ECFEFF] p-2 rounded-md mb-2 border border-[#A5F3FC]">
                                    <p class="text-xs font-bold text-[#0891B2] uppercase">Afectación</p>
                                    <p class="text-xl font-extrabold text-[#0891B2]">${pct}%</p>
                                </div>
                                <ul class="text-xs text-[#64748B] space-y-1 mt-1">
                                    <li><b class="capitalize text-[#0F172A]">Población Afectada:</b> ${Number(props.POBLACION || 0).toLocaleString('es-AR')}</li>
                                    <li><b class="capitalize text-[#0F172A]">Incidencia:</b> Nivel ${props.INCIDENCIA || 'N/D'}</li>
                                </ul>
                            </div>`;

                        layer.bindPopup(content);
                        layer.on('click', zoomToCgmBounds);
                    }
                }).addTo(inundablesLayer);
            }).catch(e => console.log('Error loading inundables:', e));

            // -----------------------------------------------------
            // FUNCIONES AUXILIARES PARA PUNTOS
            // -----------------------------------------------------

            const pathSemaforo = '<rect x="7" y="2" width="10" height="20" rx="3"/><circle cx="12" cy="7" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="17" r="1.5"/>';
            const pathReductor = '<path d="m20.9 18.55-8-15.98a1 1 0 0 0-1.8 0l-8 15.98"/><path d="M4.34 10a11.24 11.24 0 0 1 15.32 0"/><path d="M8.64 14.5a5.42 5.42 0 0 1 6.72 0"/><path d="M2 22h20"/>';
            const pathSolicitud = '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15h6"/>';
            
            const pathCamara = '<path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.934a.5.5 0 0 0-.777-.416L16 11"/><rect x="2" y="6" width="14" height="12" rx="2"/>';
            const pathAlarma = '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>';
            const pathComisaria = '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>';

            const pathAsoc = '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>';
            const pathJubilados = '<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>';
            const pathCulturales = '<path d="M12 2C6.5 2 2 6.5 2 12s5 10 10 10c1.7 0 3-.8 4-2 .4-.5.1-1.2-.5-1.2-1.3 0-2.3-1.4-1.8-2.6.4-1.2 1.8-1.9 3.2-1.9h.4c2.8 0 4.7-2.7 4.7-5.3C22 6.5 17.5 2 12 2Z"/>';
            const pathClubes = '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 1.1-.9 2-2 2H4"/><path d="M14 14.66V17c0 1.1.9 2 2 2h4"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>';
            const pathComedores = '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>';
            const pathEducacion = '<path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>';
            const pathFundaciones = '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>';
            const pathIglesias = '<path d="M12 2v20"/><path d="M8 7h8"/>';
            const pathSalud = '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>';
            const pathFomento = '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>';

            function getLeafletIcon(color, iconPath) {
                const size = 22; // Tamaño estándar para Leaflet
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="${size}" height="${size}">
                        <circle cx="16" cy="16" r="15" fill="${color}" stroke="#FFFFFF" stroke-width="2"/>
                        <g fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(4, 4) scale(0.95)">
                            ${iconPath}
                        </g>
                    </svg>
                `;
                return L.divIcon({
                    html: svg,
                    className: 'custom-leaflet-icon',
                    iconSize: [size, size],
                    iconAnchor: [size/2, size/2],
                    popupAnchor: [0, -size/2]
                });
            }

            function cargarCapaPuntos(url, layerGroup, color, path, colorTitle, defaultTitle) {
                fetch(url).then(r => r.json()).then(data => {
                    L.geoJSON(data, {
                        filter: function(feature) {
                            const featCgm = feature.properties.CGM;
                            if (featCgm && featCgm.toUpperCase() === "PARQUE BARON") return true;
                            // Bounding box filter para casos sin la propiedad CGM asignada correctamente
                            if (!featCgm && feature.geometry.type === 'Point') {
                                const lng = feature.geometry.coordinates[0];
                                const lat = feature.geometry.coordinates[1];
                                if (lat >= -34.786 && lat <= -34.750 && lng >= -58.456 && lng <= -58.423) return true;
                            }
                            return false;
                        },
                        pointToLayer: function(feature, latlng) {
                            return L.marker(latlng, { icon: getLeafletIcon(color, path) });
                        },
                        onEachFeature: function(feature, layer) {
                            const props = feature.properties;
                            const name = props.NOMBRE || props.nombre || props['Nombre Ins'] || props.Name || props.NAME || defaultTitle;
                            
                            let content = `<div class="font-sans min-w-[180px]">`;
                            content += `<h3 style="font-weight: 800; font-size: 14px; color: ${colorTitle}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px;">${name}</h3>`;
                            
                            if (props.description) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Detalle:</b> ${props.description}</p>`;
                            if (props.Tipo) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Tipo:</b> ${props.Tipo}</p>`;
                            if (props.TIPO) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Categoría:</b> ${props.TIPO}</p>`;
                            
                            if (props.UBICACION) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Ubicación:</b> ${props.UBICACION}</p>`;
                            if (props.nivel) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Nivel:</b> ${props.nivel}</p>`;
                            if (props.modalidad) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Modalidad:</b> ${props.modalidad}</p>`;
                            if (props.calle) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Dirección:</b> ${props.calle} ${props.nro || ''}</p>`;
                            
                            if (props.Ubicacion) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Ubicación:</b> ${props.Ubicacion}</p>`;
                            if (props.CGM) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${props.CGM}</p>`;
                            
                            content += `</div>`;

                            layer.bindPopup(content);
                            layer.on('click', zoomToCgmBounds);
                        }
                    }).addTo(layerGroup);
                }).catch(e => console.log('Error loading ' + url, e));
            }

            // Infraestructura Vial
            cargarCapaPuntos('./Semaforos Activos.geojson', semaforosLayer, '#19567C', pathSemaforo, '#19567C', 'Semáforo Activo');
            cargarCapaPuntos('./Reductores de Velocidad.geojson', reductoresLayer, '#D34872', pathReductor, '#D34872', 'Reductor de Velocidad');
            cargarCapaPuntos('./Solicitudes Semaforos 2026.geojson', solicitudesLayer, '#4AB5E0', pathSolicitud, '#4AB5E0', 'Solicitud 2026');

            // Seguridad
            cargarCapaPuntos('./Camaras_Parque Baron.geojson', camarasLayer, '#8B5CF6', pathCamara, '#8B5CF6', 'Cámara de Seguridad');
            cargarCapaPuntos('./alarmas_Parque Baron.geojson', alarmasLayer, '#F59E0B', pathAlarma, '#F59E0B', 'Alarma Comunitaria');
            cargarCapaPuntos('./seguridad_Parque Baron.geojson', comisariasLayer, '#10B981', pathComisaria, '#10B981', 'Comisaría');

            // Instituciones
            cargarCapaPuntos('./asociaciones_civiles_Parque Baron.geojson', asocCivilesLayer, '#3B82F6', pathAsoc, '#3B82F6', 'Asociación Civil');
            cargarCapaPuntos('./centro_de_jubilados_Parque Baron.geojson', jubiladosLayer, '#14B8A6', pathJubilados, '#14B8A6', 'Centro de Jubilados');
            cargarCapaPuntos('./Centros_culturales_Parque Baron.geojson', culturalesLayer, '#F43F5E', pathCulturales, '#F43F5E', 'Centro Cultural');
            cargarCapaPuntos('./Clubes_deportivos_Parque Baron.geojson', clubesLayer, '#0EA5E9', pathClubes, '#0EA5E9', 'Club Deportivo');
            cargarCapaPuntos('./Comedores_Parque Baron.geojson', comedoresLayer, '#EAB308', pathComedores, '#EAB308', 'Comedor');
            cargarCapaPuntos('./establecimientos_educativos_Parque Baron.geojson', educacionLayer, '#2563EB', pathEducacion, '#2563EB', 'Establecimiento Educativo');
            cargarCapaPuntos('./fundaciones_Parque Baron.geojson', fundacionesLayer, '#D946EF', pathFundaciones, '#D946EF', 'Fundación');
            cargarCapaPuntos('./iglesias_Parque Baron.geojson', iglesiasLayer, '#8B5CF6', pathIglesias, '#8B5CF6', 'Iglesia');
            cargarCapaPuntos('./Centros_de_atencion_sanitaria_Parque Baron.geojson', saludLayer, '#10B981', pathSalud, '#10B981', 'Centro de Salud');
            cargarCapaPuntos('./sociedades_de_fomento_Parque Baron.geojson', fomentoLayer, '#06B6D4', pathFomento, '#06B6D4', 'Sociedad de Fomento');

            // --- CHECKBOXES TOGGLES ---
            document.getElementById('cb-limite').addEventListener('change', (e) => {
                e.target.checked ? map.addLayer(limiteElements) : map.removeLayer(limiteElements);
            });

            const toggleLayer = (id, layerInstance) => {
                const el = document.getElementById(id);
                if(el) {
                    el.addEventListener('change', (e) => {
                        e.target.checked ? map.addLayer(layerInstance) : map.removeLayer(layerInstance);
                    });
                }
            };

            // Demografía
            toggleLayer('cb-poblacion', poblacionLayer);
            toggleLayer('cb-pobreza', pobrezaLayer);
            toggleLayer('cb-inundables', inundablesLayer);

            // Infraestructura
            toggleLayer('cb-semaforos', semaforosLayer);
            toggleLayer('cb-reductores', reductoresLayer);
            toggleLayer('cb-solicitudes', solicitudesLayer);
            toggleLayer('cb-limite-cgm', limiteCgmLayer);
            toggleLayer('cb-barrios-populares', barriosPopularesLayer);

            // Seguridad
            toggleLayer('cb-camaras', camarasLayer);
            toggleLayer('cb-alarmas', alarmasLayer);
            toggleLayer('cb-comisarias', comisariasLayer);
            
            // Instituciones
            toggleLayer('cb-asoc-civiles', asocCivilesLayer);
            toggleLayer('cb-jubilados', jubiladosLayer);
            toggleLayer('cb-culturales', culturalesLayer);
            toggleLayer('cb-clubes', clubesLayer);
            toggleLayer('cb-comedores', comedoresLayer);
            toggleLayer('cb-educacion', educacionLayer);
            toggleLayer('cb-fundaciones', fundacionesLayer);
            toggleLayer('cb-iglesias', iglesiasLayer);
            toggleLayer('cb-salud', saludLayer);
            toggleLayer('cb-fomento', fomentoLayer);
        }

        document.addEventListener("DOMContentLoaded", initMap);
    </script>
</body>
</html>
