<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Mapas - Lomas de Zamora</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
            text-align: center;
        }
        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 40px;
            text-align: center;
            font-size: 1.1em;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .card {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 25px 20px;
            text-align: center;
            text-decoration: none;
            color: #2980b9;
            font-weight: 600;
            font-size: 1.2em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e8ed;
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            background-color: #2980b9;
            color: #ffffff;
            border-color: #2980b9;
        }
    </style>
</head>
<body>

    <h1>Mapas de Lomas de Zamora</h1>
    <p class="subtitle">Seleccioná una localidad para acceder a su mapa interactivo</p>

    <div class="grid-container">
        <a href="mapa_Albertina.html" class="card">Albertina</a>
        <a href="mapa_Banfield.html" class="card">Banfield</a>
        <a href="mapa_Budge.html" class="card">Budge</a>
        <a href="mapa_Centenario.html" class="card">Centenario</a>
        <a href="mapa_Fiorito.html" class="card">Fiorito</a>
        <a href="mapa_Lamadrid.html" class="card">Lamadrid</a>
        <a href="mapa_Llavallol.html" class="card">Llavallol</a>
        <a href="mapa_Lomas.html" class="card">Lomas Centro</a>
        <a href="mapa_Parque_Baron.html" class="card">Parque Barón</a>
        <a href="mapa_San%20Jose.html" class="card">San José</a>
        <a href="mapa_Santa%20Catalina.html" class="card">Santa Catalina</a>
        <a href="mapa_Santa%20Marta.html" class="card">Santa Marta</a>
        <a href="mapa_Temperley.html" class="card">Temperley</a>
        <a href="mapa_Turdera.html" class="card">Turdera</a>
    </div>

</body>
</html>
