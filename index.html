<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interactivo CGM Parque Baron</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-main: #19567C;
            --blanco: #FFFFFF;
            --acento: #4AB5E0;
            --magenta: #D34872;
            --azul-inst: #19567C;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-main); color: var(--blanco); margin: 0; min-height: 100vh; }
        
        #map { height: 100%; width: 100%; border-radius: 8px; background-color: #f8fafc; z-index: 10; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F3F6F9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E6EDF3; border-radius: 4px; }

        /* Ajustes para la ventana de Info de Google Maps */
        .gm-style-iw.gm-style-iw-c {
            border-radius: 8px !important;
            padding: 12px !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
        }
        .gm-style-iw-d { overflow: hidden !important; }
        button.gm-ui-hover-effect { display: none !important; } /* Ocultamos el botón nativo de Google */

        /* Estilos del Botón de Cierre Personalizado */
        .custom-close-btn {
            position: absolute;
            right: -4px;
            top: -6px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #94A3B8;
            font-size: 22px;
            font-weight: bold;
            line-height: 1;
            padding: 2px 6px;
            border-radius: 6px;
            transition: all 0.2s ease;
            z-index: 50;
        }
        .custom-close-btn:hover {
            background-color: #F1F5F9;
            color: var(--bg-main);
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="bg-[var(--bg-main)] shadow-lg border-b-4 border-[var(--acento)] z-20 py-6 px-4 shrink-0">
        <div class="max-w-[1600px] mx-auto flex items-center justify-center gap-4">
            <div class="bg-white text-[var(--bg-main)] rounded-full h-14 w-14 flex items-center justify-center shadow-md">
                <i class="fa-solid fa-car text-2xl"></i>
            </div>
            <div class="flex flex-col">
                <h1 class="text-3xl font-extrabold tracking-tight uppercase leading-none">Mapa Interactivo CGM Parque Baron</h1>
            </div>
        </div>
    </header>

    <main class="w-full max-w-[1600px] mx-auto py-8 px-4 flex-1 flex flex-col lg:flex-row gap-6">
        
        <aside class="w-full lg:w-80 bg-white rounded-xl shadow-md border border-[#E6EDF3] flex flex-col max-h-[calc(100vh-200px)] overflow-hidden shrink-0 z-20">
            <div class="p-4 border-b bg-[#F3F6F9] flex items-center gap-2">
                <i data-lucide="filter" class="text-[#0B5F8D] h-5 w-5"></i>
                <h3 class="font-bold text-[#0F172A] uppercase text-sm">Filtros Operativos</h3>
            </div>
            
            <div class="p-5 overflow-y-auto custom-scrollbar flex-1 space-y-6">

                <!-- DIVISIÓN TERRITORIAL -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="map" class="h-4 w-4"></i> División Territorial
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-limite" checked class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Límite Lomas de Zamora</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-limite-cgm" checked class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Límites CGM</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-barrios-populares" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Barrios Populares</span>
                        </label>
                    </div>
                </div>

                <!-- DEMOGRAFÍA Y ZONIFICACIÓN -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="pie-chart" class="h-4 w-4"></i> Demografía y Zonificación
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-poblacion" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Población (Radios Censales)</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-pobreza" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Pobreza Crónica</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-inundables" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Zonas Inundables</span>
                        </label>
                    </div>
                </div>

                <!-- ESPACIOS PÚBLICOS -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="tree-pine" class="h-4 w-4"></i> Espacios Públicos
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-plazas" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Plazas</span>
                        </label>
                    </div>
                </div>

                <!-- INSTITUCIONES -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="building-2" class="h-4 w-4"></i> Instituciones
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-asoc-civiles" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Asociaciones Civiles</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-jubilados" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Centros de Jubilados</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-culturales" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Centros Culturales</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-clubes" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Clubes Deportivos</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-comedores" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Comedores</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-educacion" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Establecimientos Educativos</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-fundaciones" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Fundaciones</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-iglesias" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Iglesias</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-salud" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Salud / C.A.P.S.</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-fomento" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Sociedades de Fomento</span>
                        </label>
                    </div>
                </div>

                <!-- INFRAESTRUCTURA VIAL -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="cone" class="h-4 w-4"></i> Infraestructura Vial
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-callejero" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Callejero</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-semaforos" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Semáforos Activos</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-reductores" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Reductores de Velocidad</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-solicitudes" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Solicitudes Semáforos 2026</span>
                        </label>
                    </div>
                </div>

                <!-- SEGURIDAD -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="shield-alert" class="h-4 w-4"></i> Seguridad
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-camaras" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Cámaras de Seguridad</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-alarmas" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Alarmas Comunitarias</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-comisarias" class="w-4 h-4 accent-[#19567C]">
                            <span class="text-sm text-[#0F172A] font-bold">Comisarías</span>
                        </label>
                    </div>
                </div>

                <!-- STREET VIEW -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-street-view text-[#19567C] h-4 w-4"></i> Street View
                    </h4>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="cb-streetview" class="w-4 h-4 accent-[#19567C]">
                        <span class="text-sm text-[#0F172A] font-bold">Habilitar "Pegman"</span>
                    </label>
                </div>

                <!-- TRÁFICO -->
                <div class="bg-[#19567C]/10 p-3 rounded-lg border border-[#19567C]/30">
                    <h4 class="text-xs font-extrabold text-[#19567C] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="activity" class="h-4 w-4"></i> Tráfico
                    </h4>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="cb-trafico" class="w-4 h-4 accent-[#19567C]">
                        <span class="text-sm text-[#0F172A] font-bold">Ver Tráfico Real</span>
                    </label>
                </div>

            </div>
        </aside>

        <div class="flex-1 bg-white p-2 rounded-xl shadow-lg border border-[#E6EDF3] flex flex-col min-h-[500px] relative z-10">
            <div id="map"></div>
        </div>

    </main>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB2MHti5Cy4IDKPc3Iu0ypNQg_BgsjcMoQ&callback=initMap" defer></script>

    <script>
        let map, trafficLayer, infoWindow;
        let infoWindowTimer; 
        
        let semaforosLayer, reductoresLayer, solicitudesLayer, callejeroLayer;
        let limiteElements = []; 
        let limiteCgmLayer, barriosPopularesLayer;
        let camarasLayer, alarmasLayer, comisariasLayer;
        
        // Variables de Capas Demografía y Zonificación
        let poblacionLayer, pobrezaLayer, inundablesLayer;

        // Variables de Capas Instituciones y Espacios Públicos
        let asocCivilesLayer, jubiladosLayer, culturalesLayer, clubesLayer, comedoresLayer, 
            educacionLayer, fundacionesLayer, iglesiasLayer, saludLayer, fomentoLayer, plazasLayer;

        // --- FUNCIÓN PARA EL TEMPORIZADOR DE INFOWINDOW ---
        function startInfoWindowTimer() {
            if (infoWindowTimer) clearTimeout(infoWindowTimer);
            infoWindowTimer = setTimeout(() => {
                if (infoWindow) infoWindow.close();
            }, 10000); 
        }

        // --- FUNCIÓN GLOBAL PARA EL BOTÓN MANUAL DE CIERRE ---
        window.closeInfoWindow = function() {
            if (infoWindow) {
                infoWindow.close();
            }
            if (infoWindowTimer) {
                clearTimeout(infoWindowTimer);
            }
        };

        function initMap() {
            lucide.createIcons();
            
            // LA CLAVE: disableAutoPan evita que el infoWindow pelee con la función fitBounds() del mapa.
            infoWindow = new google.maps.InfoWindow({
                disableAutoPan: true
            });
            
            // --- EVENTOS PARA PAUSAR EL TEMPORIZADOR POR INACTIVIDAD ---
            google.maps.event.addListener(infoWindow, 'domready', () => {
                const iwContainer = document.querySelector('.gm-style-iw-c');
                if (iwContainer) {
                    iwContainer.addEventListener('mouseenter', () => {
                        if (infoWindowTimer) clearTimeout(infoWindowTimer);
                    });
                    iwContainer.addEventListener('mouseleave', () => {
                        startInfoWindowTimer();
                    });
                }
            });

            // Estilo claro minimalista
            const mapStyle = [
                { featureType: "poi", stylers: [{ visibility: "off" }] },
                { featureType: "transit", stylers: [{ visibility: "off" }] },
                { elementType: "geometry", stylers: [{ color: "#f5f5f5" }] },
                { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
                { elementType: "labels.text.fill", stylers: [{ color: "#616161" }] },
                { elementType: "labels.text.stroke", stylers: [{ color: "#f5f5f5" }] },
                { featureType: "water", elementType: "geometry", stylers: [{ color: "#c9e8f5" }] },
                { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#9e9e9e" }] }
            ];

            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -34.7573, lng: -58.4035 },
                zoom: 13,
                styles: mapStyle,
                mapTypeControl: false,
                streetViewControl: false, // Inicia desactivado
                streetViewControlOptions: {
                    position: google.maps.ControlPosition.RIGHT_BOTTOM // Posición cómoda
                }
            });
            
            // -----------------------------------------------------
            // CARGA DE CAPAS GEOGRÁFICAS BÁSICAS
            // -----------------------------------------------------
            
            fetch('./municipios_Lomas de Zamora.geojson').then(r => r.json()).then(geoJson => {
                geoJson.features.forEach(feature => {
                    if (feature.geometry.type === 'MultiPolygon' || feature.geometry.type === 'Polygon') {
                        const polys = feature.geometry.type === 'Polygon' ? [feature.geometry.coordinates] : feature.geometry.coordinates;
                        polys.forEach(poly => {
                            poly.forEach(ring => {
                                const path = ring.map(coord => ({ lat: coord[1], lng: coord[0] }));
                                const p = new google.maps.Polygon({ paths: path, strokeOpacity: 0, fillColor: '#19567C', fillOpacity: 0.03, map: map, zIndex: 2 });
                                const lineSymbol = { path: 'M 0,-1 0,1', strokeOpacity: 1, scale: 3 };
                                const l = new google.maps.Polyline({ path: path, strokeOpacity: 0, icons: [{ icon: lineSymbol, offset: '0', repeat: '15px' }], strokeColor: '#19567C', strokeWeight: 3, map: map, zIndex: 3 });
                                limiteElements.push(p, l);
                            });
                        });
                    }
                });
            }).catch(e => console.log('Error cargando límite:', e));

            limiteCgmLayer = new google.maps.Data();
            limiteCgmLayer.loadGeoJson('./cgm_Parque Baron.geojson');
            limiteCgmLayer.setStyle({
                fillColor: '#4AB5E0',
                fillOpacity: 0.15,
                strokeColor: '#19567C',
                strokeWeight: 2,
                zIndex: 5
            });
            limiteCgmLayer.setMap(map);

            barriosPopularesLayer = new google.maps.Data();
            barriosPopularesLayer.loadGeoJson('./barrios_cgm_Parque Baron.geojson');
            barriosPopularesLayer.setStyle({
                fillColor: '#D34872',
                fillOpacity: 0.4,
                strokeColor: '#D34872',
                strokeWeight: 2,
                zIndex: 6
            });

            // -----------------------------------------------------
            // CAPAS DEMOGRÁFICAS Y DE ZONIFICACIÓN (Con Fetch y Estilos Dinámicos)
            // -----------------------------------------------------
            
            poblacionLayer = new google.maps.Data(); 
            fetch('./poblacion_cgm_Parque Baron.geojson').then(r => r.json()).then(data => {
                let maxVal = 0;
                data.features.forEach(f => {
                    let val = parseInt(f.properties['Habitantes'] || f.properties['RADIOS_POB']) || 0;
                    if (val > maxVal) maxVal = val;
                });
                poblacionLayer.addGeoJson(data);
                poblacionLayer.setStyle(function(feature) {
                    let val = parseInt(feature.getProperty('Habitantes') || feature.getProperty('RADIOS_POB')) || 0;
                    let color = '#D1E1F0';
                    if (maxVal > 0) {
                        if (val > maxVal * 0.8) color = '#084A6F';
                        else if (val > maxVal * 0.6) color = '#0B5F8D';
                        else if (val > maxVal * 0.4) color = '#2A7FA8';
                        else if (val > maxVal * 0.2) color = '#6BA1C7';
                    }
                    return { fillColor: color, fillOpacity: 0.85, strokeColor: '#FFFFFF', strokeWeight: 2, zIndex: 4 };
                });
            }).catch(e => console.log('Error loading poblacion:', e));

            pobrezaLayer = new google.maps.Data(); 
            fetch('./pobreza_cronica_cgm_Parque Baron.geojson').then(r => r.json()).then(data => {
                let maxVal = 0;
                data.features.forEach(f => {
                    let val = parseFloat(f.properties['P_PC_PER']) || 0;
                    if (val > maxVal) maxVal = val;
                });
                pobrezaLayer.addGeoJson(data);
                pobrezaLayer.setStyle(function(feature) {
                    let pct = parseFloat(feature.getProperty('P_PC_PER')) || 0;
                    // 3 Estados (Mayor a Menor) en azules institucionales
                    let color = pct >= 15 ? '#084A6F' : // Estado 1: Alta (Azul oscuro)
                                pct >= 5  ? '#2A7FA8' : // Estado 2: Media (Azul intermedio)
                                            '#D1E1F0';  // Estado 3: Baja (Azul claro)
                    return {
                        fillColor: color,
                        fillOpacity: 0.85,
                        strokeColor: '#FFFFFF',
                        strokeWeight: 2,
                        zIndex: 4
                    };
                });
            }).catch(e => console.log('Error loading pobreza:', e));

            inundablesLayer = new google.maps.Data(); 
            fetch('./zonas_inundables_cgm_Parque Baron.geojson').then(r => r.json()).then(data => {
                let maxVal = 0;
                data.features.forEach(f => {
                    let val = parseFloat(f.properties['PORCENTAJE']) || 0;
                    if (val > maxVal) maxVal = val;
                });
                inundablesLayer.addGeoJson(data);
                inundablesLayer.setStyle(function(feature) {
                    let val = parseFloat(feature.getProperty('PORCENTAJE')) || 0;
                    let color = '#38BDF8';
                    if(maxVal > 0) {
                        if (val > maxVal * 0.8) color = '#DC2626';
                        else if (val > maxVal * 0.6) color = '#C026D3';
                        else if (val > maxVal * 0.4) color = '#7C3AED';
                        else if (val > maxVal * 0.2) color = '#4F46E5';
                    }
                    return { fillColor: color, fillOpacity: 0.85, strokeColor: '#FFFFFF', strokeWeight: 2, zIndex: 4 };
                });
            }).catch(e => console.log('Error loading inundables:', e));

            // Capas Puntos Varias
            semaforosLayer = new google.maps.Data(); semaforosLayer.loadGeoJson('./Semaforos Activos.geojson');
            reductoresLayer = new google.maps.Data(); reductoresLayer.loadGeoJson('./Reductores de Velocidad.geojson');
            solicitudesLayer = new google.maps.Data(); solicitudesLayer.loadGeoJson('./Solicitudes Semaforos 2026.geojson');
            
            // Callejero (Infraestructura Vial)
            callejeroLayer = new google.maps.Data(); callejeroLayer.loadGeoJson('./callejero_lomas_ok.geojson');

            // Capas de Seguridad
            camarasLayer = new google.maps.Data(); camarasLayer.loadGeoJson('./Camaras_Parque Baron.geojson');
            alarmasLayer = new google.maps.Data(); alarmasLayer.loadGeoJson('./alarmas_Parque Baron.geojson');
            comisariasLayer = new google.maps.Data(); comisariasLayer.loadGeoJson('./seguridad_Parque Baron.geojson');

            // Espacios Públicos
            plazasLayer = new google.maps.Data(); plazasLayer.loadGeoJson('./Plazas.geojson');

            // Capas Instituciones
            asocCivilesLayer = new google.maps.Data(); asocCivilesLayer.loadGeoJson('./asociaciones_civiles_Parque Baron.geojson');
            jubiladosLayer = new google.maps.Data(); jubiladosLayer.loadGeoJson('./centro_de_jubilados_Parque Baron.geojson');
            culturalesLayer = new google.maps.Data(); culturalesLayer.loadGeoJson('./Centros_culturales_Parque Baron.geojson');
            clubesLayer = new google.maps.Data(); clubesLayer.loadGeoJson('./Clubes_deportivos_Parque Baron.geojson');

            function getSvgIcon(color, iconPath, size) {
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="${size}" height="${size}">
                        <circle cx="16" cy="16" r="15" fill="${color}" stroke="#FFFFFF" stroke-width="2"/>
                        <g fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(4, 4) scale(0.95)">
                            ${iconPath}
                        </g>
                    </svg>
                `;
                return {
                    url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
                    scaledSize: new google.maps.Size(size, size),
                    anchor: new google.maps.Point(size/2, size/2)
                };
            }

            function updatePointStyles() {
                const zoom = map.getZoom();
                let size = 10;   
                if (zoom >= 15) { size = 20; }       
                else if (zoom >= 13) { size = 14; } 

                const targetCgm = "PARQUE BARON";

                const applyStyleWithFilter = (layer, color, path) => {
                    layer.setStyle((feature) => {
                        const featCgm = feature.getProperty('CGM');
                        let isVisible = false;
                        
                        if (featCgm) {
                            if (featCgm.toUpperCase() === targetCgm) isVisible = true;
                        } else {
                            // Fallback de seguridad por Bounding Box para capas sin campo CGM explícito
                            const geom = feature.getGeometry();
                            if (geom && geom.getType() === 'Point') {
                                const lat = geom.get().lat();
                                const lng = geom.get().lng();
                                // Bounding box geográfico para Parque Baron
                                if (lat >= -34.786 && lat <= -34.750 && lng >= -58.456 && lng <= -58.423) {
                                    isVisible = true; 
                                }
                            }
                        }
                        
                        return {
                            icon: getSvgIcon(color, path, size),
                            zIndex: 10,
                            visible: isVisible
                        };
                    });
                };

                // Infraestructura Vial
                applyStyleWithFilter(semaforosLayer, '#19567C', pathSemaforo);
                applyStyleWithFilter(reductoresLayer, '#D34872', pathReductor);
                applyStyleWithFilter(solicitudesLayer, '#4AB5E0', pathSolicitud);
                
                // Estilo especial para Callejero (Líneas)
                callejeroLayer.setStyle((feature) => {
                    const featCgm = feature.getProperty('CGM');
                    let isVisible = false;
                    if (featCgm && featCgm.toUpperCase() === targetCgm) {
                        isVisible = true;
                    }
                    return {
                        strokeColor: '#94A3B8',
                        strokeWeight: 2,
                        visible: isVisible,
                        zIndex: 2
                    };
                });

                // Seguridad
                applyStyleWithFilter(camarasLayer, '#8B5CF6', pathCamara); // Púrpura
                applyStyleWithFilter(alarmasLayer, '#F59E0B', pathAlarma); // Naranja/Ambar

                applyStyleWithFilter(jubiladosLayer, '#14B8A6', pathJubilados);
                applyStyleWithFilter(culturalesLayer, '#F43F5E', pathCulturales);
                applyStyleWithFilter(clubesLayer, '#0EA5E9', pathClubes);
                applyStyleWithFilter(comedoresLayer, '#EAB308', pathComedores);

                applyStyleWithFilter(saludLayer, '#10B981', pathSalud);

            // FUNCIÓN PARA ENCUADRAR LOS LÍMITES DEL CGM PARQUE BARON (MEJORADA Y CACHEADA)
            let cgmBoundsCache = null;

            function zoomToCgmBounds() {
                if (!cgmBoundsCache) {
                    const bounds = new google.maps.LatLngBounds();
                    let hasBounds = false;
                    limiteCgmLayer.forEach((feature) => {
                        feature.getGeometry().forEachLatLng((latlng) => {
                            bounds.extend(latlng);
                            hasBounds = true;
                        });
                    });
                    if (hasBounds) {
                        cgmBoundsCache = bounds;
                    }
                }
                
                if (cgmBoundsCache) {
                    // Timeout para asegurar que la acción venza a cualquier movimiento remanente del mapa
                    setTimeout(() => {
                        map.fitBounds(cgmBoundsCache, 40); // 40px padding para encuadre seguro
                    }, 50);
                }
            }

            toggleLayer('cb-alarmas', alarmasLayer);
            toggleLayer('cb-comisarias', comisariasLayer);
            
            // Instituciones
            toggleLayer('cb-asoc-civiles', asocCivilesLayer);
            toggleLayer('cb-jubilados', jubiladosLayer);
            toggleLayer('cb-culturales', culturalesLayer);
            toggleLayer('cb-clubes', clubesLayer);
            toggleLayer('cb-comedores', comedoresLayer);
            toggleLayer('cb-educacion', educacionLayer);
            toggleLayer('cb-fundaciones', fundacionesLayer);
            toggleLayer('cb-iglesias', iglesiasLayer);
            toggleLayer('cb-salud', saludLayer);
            toggleLayer('cb-fomento', fomentoLayer);
            
            toggleLayer('cb-trafico', trafficLayer);
            
            // LOGICA PARA HABILITAR PEGMAN
            document.getElementById('cb-streetview').addEventListener('change', (e) => {
                map.setOptions({ streetViewControl: e.target.checked });
            });
        }
    </script>
