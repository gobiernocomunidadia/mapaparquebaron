    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        let map;
        let cgmBoundsCache = null; 
        let limiteCgmLayerObj = null;

        // Variables de Capas
        let limiteElements, limiteCgmLayer, barriosPopularesLayer;
        let poblacionLayer, pobrezaLayer, inundablesLayer, escolaridadLayer, indSaludLayer;
        let semaforosLayer, reductoresLayer, solicitudesLayer;
        let camarasLayer, alarmasLayer, comisariasLayer, lprLayer;
        let asocCivilesLayer, jubiladosLayer, culturalesLayer, clubesLayer, comedoresLayer, 
            educacionLayer, fundacionesLayer, iglesiasLayer, saludLayer, fomentoLayer;
        
        // Variables para Espacios Públicos
        let plazasLayer, parquesLayer, potrerosLayer;

        // Variables para Obras (Infraestructura y Planeamiento)
        let bacheo2024Layer, bacheo2025Layer, bacheo2026Layer, bacheoConcretoLayer, bacheoFrioLayer, pavimentacionConcretoLayer;
        
        // Variables para Barrenderos y Callejero
        let barrenderosLayer;
        let barrenderosData = null;
        let barrenderosColorMap = {};
        
        let callejeroLayer;
        let callejeroData = null;
        let pavimentosColorMap = {};

        // Variables para Reclamos
        let reclamosLayer;
        let reclamosData = null;

        const paletaAzules = ['#084A6F', '#0B5F8D', '#2A7FA8', '#6BA1C7', '#19567C', '#4AB5E0', '#003B5C', '#1E3A8A', '#3B82F6', '#60A5FA'];
        const paletaPavimentos = ['#475569', '#3B82F6', '#D97706', '#10B981', '#8B5CF6', '#F43F5E', '#64748B'];

        // FUNCIONES DE REPROYECCIÓN DE EPSG:3857 A EPSG:4326
        function convert3857to4326(coord) {
            const x = coord[0];
            const y = coord[1];
            const lon = (x * 180) / 20037508.34;
            const lat = (Math.atan(Math.exp((y * Math.PI) / 20037508.34)) * 360) / Math.PI - 90;
            return [lon, lat];
        }
        
        function fixGeometry3857(geometry) {
            if (!geometry || !geometry.coordinates) return;
            if (geometry.type === 'Point') {
                geometry.coordinates = convert3857to4326(geometry.coordinates);
            } else if (geometry.type === 'LineString' || geometry.type === 'MultiPoint') {
                geometry.coordinates = geometry.coordinates.map(convert3857to4326);
            } else if (geometry.type === 'MultiLineString' || geometry.type === 'Polygon') {
                geometry.coordinates = geometry.coordinates.map(ring => ring.map(convert3857to4326));
            } else if (geometry.type === 'MultiPolygon') {
                geometry.coordinates = geometry.coordinates.map(poly => poly.map(ring => ring.map(convert3857to4326)));
            }
        }

        function initMap() {
            lucide.createIcons();

            map = L.map('map').setView([-34.7573, -58.4035], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            // Inicialización de Grupos de Capas
            limiteElements = L.layerGroup().addTo(map);
            limiteCgmLayer = L.layerGroup().addTo(map);
            barriosPopularesLayer = L.layerGroup();
            
            poblacionLayer = L.layerGroup();
            pobrezaLayer = L.layerGroup();
            inundablesLayer = L.layerGroup();
            escolaridadLayer = L.layerGroup();
            indSaludLayer = L.layerGroup();

            plazasLayer = L.layerGroup();
            parquesLayer = L.layerGroup();
            potrerosLayer = L.layerGroup();

            semaforosLayer = L.layerGroup();
            reductoresLayer = L.layerGroup();
            solicitudesLayer = L.layerGroup();
            callejeroLayer = L.layerGroup();

            bacheo2024Layer = L.layerGroup();
            bacheo2025Layer = L.layerGroup();
            bacheo2026Layer = L.layerGroup();
            bacheoConcretoLayer = L.layerGroup();
            bacheoFrioLayer = L.layerGroup();
            pavimentacionConcretoLayer = L.layerGroup();

            camarasLayer = L.layerGroup();
            alarmasLayer = L.layerGroup();
            comisariasLayer = L.layerGroup();
            lprLayer = L.layerGroup();

            asocCivilesLayer = L.layerGroup();
            jubiladosLayer = L.layerGroup();
            culturalesLayer = L.layerGroup();
            clubesLayer = L.layerGroup();
            comedoresLayer = L.layerGroup();
            educacionLayer = L.layerGroup();
            fundacionesLayer = L.layerGroup();
            iglesiasLayer = L.layerGroup();
            saludLayer = L.layerGroup();
            fomentoLayer = L.layerGroup();

            barrenderosLayer = L.layerGroup();
            reclamosLayer = L.layerGroup();

            // FUNCIÓN PARA ENCUADRAR LOS LÍMITES DEL CGM TURDERA
            window.zoomToCgmBounds = function() {
                if (!cgmBoundsCache && limiteCgmLayerObj) {
                    cgmBoundsCache = limiteCgmLayerObj.getBounds();

                            if (props.Direccion) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Dirección:</b> ${props.Direccion}</p>`;
                            
                            if (props.Tipo_de_Intervenci__n) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Intervención:</b> ${props.Tipo_de_Intervenci__n}</p>`;
                            if (props.Presupuesto__SP_) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Presupuesto:</b> ${props.Presupuesto__SP_}</p>`;
                            
                            if (props.nivel) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Nivel:</b> ${props.nivel}</p>`;
                            if (props.modalidad) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Modalidad:</b> ${props.modalidad}</p>`;
                            if (props.calle) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Dirección:</b> ${props.calle} ${props.nro || ''}</p>`;
                            
                            if (props.Ubicacion) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Ubicación:</b> ${props.Ubicacion}</p>`;
                            if (props.CGM) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${props.CGM}</p>`;
                            
                            content += `</div>`;

                            layer.bindPopup(content);
                            layer.on('click', zoomToCgmBounds);
                        }
                    }).addTo(layerGroup);
                }).catch(e => console.log('Error loading ' + url, e));
            }

            // Infraestructura Vial (Puntos)
            cargarCapaPuntos('./Semaforos Activos.geojson', semaforosLayer, '#19567C', pathSemaforo, '#19567C', 'Semáforo Activo');
            cargarCapaPuntos('./Reductores de Velocidad.geojson', reductoresLayer, '#D34872', pathReductor, '#D34872', 'Reductor de Velocidad');
            cargarCapaPuntos('./Solicitudes Semaforos 2026.geojson', solicitudesLayer, '#4AB5E0', pathSolicitud, '#4AB5E0', 'Solicitud 2026');

            // -----------------------------------------------------
            // CALLEJERO (Líneas con Reproyección y Filtros)
            // -----------------------------------------------------
            const renderCallejero = (filtroVal) => {
                callejeroLayer.clearLayers();
                if(!callejeroData) return;

                L.geoJSON(callejeroData, {
                    filter: function(feature) {
                        const featCgm = feature.properties.CGM;
                        if (!featCgm || featCgm.toUpperCase() !== "TURDERA") return false;
                        
                        if (filtroVal === 'ALL') return true;
                        const p = feature.properties['Tipo Pavimento'] || 'Sin datos';
                        return p === filtroVal;
                    },
                    style: function(feature) {
                        const p = feature.properties['Tipo Pavimento'] || 'Sin datos';
                        const colorHex = pavimentosColorMap[p] || '#64748B';
                        return { color: colorHex, weight: 3, opacity: 0.8 };
                    },
                    onEachFeature: function(feature, layer) {
                        const props = feature.properties;
                        const p = props['Tipo Pavimento'] || 'Sin datos';
                        const colorHex = pavimentosColorMap[p] || '#64748B';

                        let content = `
                            <div class="font-sans min-w-[200px] relative">
                                <button onclick="window.closeInfoWindow()" class="custom-close-btn">&times;</button>
                                <h4 class="font-bold border-b border-[#E6EDF3] pb-1 mb-2 pr-6" style="color: ${colorHex}">Tramo de Calle</h4>
                                <div class="p-2 rounded-md mb-2" style="background-color: ${colorHex}15; border: 1px solid ${colorHex}40;">
                                    <p class="text-xs font-bold uppercase" style="color: ${colorHex}">Pavimento</p>
                                    <p class="text-sm font-extrabold" style="color: ${colorHex}">${p}</p>
                                </div>
                                <ul class="text-xs text-[#64748B] space-y-1 mt-1">
                                    <li><b class="capitalize text-[#0F172A]">Nombre:</b> ${props.NOMBRE || '-'}</li>
                                    <li><b class="capitalize text-[#0F172A]">CGM:</b> ${props.CGM || '-'}</li>
                                </ul>
                            </div>`;
                        layer.bindPopup(content);
                        layer.on('click', zoomToCgmBounds);
                    }
                }).addTo(callejeroLayer);
            };

            fetch('./callejero_Turdera.geojson').then(r => r.json()).then(data => {
                // Chequeo y transformación para EPSG:3857 (coordenadas esféricas en metros)
                let is3857 = false;
                if (data.crs && data.crs.properties && data.crs.properties.name && data.crs.properties.name.includes('3857')) {
                    is3857 = true;
                } else if (data.features.length > 0 && data.features[0].geometry && data.features[0].geometry.coordinates) {
                    const firstCoord = data.features[0].geometry.type === 'LineString' 
                                       ? data.features[0].geometry.coordinates[0] 
                                       : data.features[0].geometry.coordinates[0][0];
                    if (Math.abs(firstCoord[0]) > 1000) is3857 = true;
                }

                if (is3857) {
                    data.features.forEach(f => fixGeometry3857(f.geometry));
                }

                callejeroData = data;
                const setPavimentos = new Set();
                data.features.forEach(f => {
                    const featCgm = f.properties.CGM;
                    if (featCgm && featCgm.toUpperCase() === "TURDERA") {
                        setPavimentos.add(f.properties['Tipo Pavimento'] || 'Sin datos');
                    }
                });

                const selectEl = document.getElementById('select-pavimento');
                let cIdx = 0;
                
                Array.from(setPavimentos).sort().forEach(p => {
                    if (p === 'CONCRETO ASFALTICO' || p === 'ASFALTO') pavimentosColorMap[p] = '#475569';
                    else if (p === 'TIERRA') pavimentosColorMap[p] = '#D97706';
                    else if (p === 'HORMIGON') pavimentosColorMap[p] = '#94A3B8';
                    else if (p === 'REPAVIMENTACION') pavimentosColorMap[p] = '#3B82F6';
                    else {
                        pavimentosColorMap[p] = paletaPavimentos[cIdx % paletaPavimentos.length];
                        cIdx++;
                    }
                    
                    const opt = document.createElement('option');
                    opt.value = p;
                    opt.textContent = p;
                    selectEl.appendChild(opt);
                });

                renderCallejero('ALL');
            }).catch(e => console.log('Error loading callejero:', e));

            document.getElementById('select-pavimento').addEventListener('change', (e) => {
                renderCallejero(e.target.value);
            });

            // -----------------------------------------------------
            // INFRAESTRUCTURA Y PLANEAMIENTO (Obras)
            // -----------------------------------------------------
            function cargarCapaObras(url, layerGroup, color, colorTitle, defaultTitle) {
                fetch(url).then(r => r.json()).then(data => {
                    L.geoJSON(data, {
                        filter: function(feature) {
                            const featCgm = feature.properties.CGM;
                            if (featCgm && featCgm.toUpperCase() === "TURDERA") return true;
                            // Fallback BBox
                            const geom = feature.geometry;
                            if (geom) {
                                let lng, lat;
                                if (geom.type === 'Point') {
                                    lng = geom.coordinates[0]; lat = geom.coordinates[1];
                                } else if (geom.type === 'MultiLineString' || geom.type === 'LineString') {
                                    const coords = geom.type === 'LineString' ? geom.coordinates[0] : geom.coordinates[0][0];
                                    lng = coords[0]; lat = coords[1];
                                } else if (geom.type === 'Polygon' || geom.type === 'MultiPolygon') {
                                    const coords = geom.type === 'Polygon' ? geom.coordinates[0][0] : geom.coordinates[0][0][0];
                                    lng = coords[0]; lat = coords[1];
                                }
                                if (lng && lat) {
                                    if (lat >= -34.786 && lat <= -34.750 && lng >= -58.456 && lng <= -58.423) return true;
                                }
                            }
                            return false;
                        },
                        style: function(feature) {
                            return { color: color, weight: 4, opacity: 0.8, fillColor: color, fillOpacity: 0.5 };
                        },
                        pointToLayer: function(feature, latlng) {
                            return L.circleMarker(latlng, {
                                radius: 6,
                                fillColor: color,
                                color: '#FFFFFF',
                                weight: 2,
                                opacity: 1,
                                fillOpacity: 0.9
                            });
                        },
                        onEachFeature: function(feature, layer) {
                            const props = feature.properties;
                            const name = props.Name || props.NOMBRE || props.nombre || defaultTitle;
                            
                            let content = `<div class="font-sans min-w-[180px] relative">`;
                            content += `<button onclick="window.closeInfoWindow()" class="custom-close-btn">&times;</button>`;
                            content += `<h3 style="font-weight: 800; font-size: 14px; color: ${colorTitle}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">${name}</h3>`;
                            
                            if (props.description) {
                                // Limpiamos brs generados por KML/GoogleEarth
                                let cleanDesc = props.description.replace(/<br>/gi, ' ').trim();
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Detalle:</b> ${cleanDesc}</p>`;
                            }
                            if (props.descripci__n) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Detalle:</b> ${props.descripci__n}</p>`;
                            
                            if (props.CGM) content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${props.CGM}</p>`;
                            
                            content += `</div>`;
                            layer.bindPopup(content);
                            layer.on('click', zoomToCgmBounds);
                        }
                    }).addTo(layerGroup);
                }).catch(e => console.log('Error loading ' + url, e));
            }

            cargarCapaObras('./bacheo_2024_Turdera.geojson', bacheo2024Layer, '#EAB308', '#CA8A04', 'Bacheo 2024');
            cargarCapaObras('./bacheo_2025_Turdera.geojson', bacheo2025Layer, '#F97316', '#C2410C', 'Bacheo 2025');
            cargarCapaObras('./bacheo_2026_Turdera.geojson', bacheo2026Layer, '#EF4444', '#B91C1C', 'Bacheo 2026');
            cargarCapaObras('./bache_en_concreto_Turdera.geojson', bacheoConcretoLayer, '#64748B', '#475569', 'Bacheo en Concreto');
            cargarCapaObras('./bacheo_en_frio_Turdera.geojson', bacheoFrioLayer, '#06B6D4', '#0E7490', 'Bacheo en Frío');
            cargarCapaObras('./pavimentacion_en_concreto_Turdera.geojson', pavimentacionConcretoLayer, '#8B5CF6', '#6D28D9', 'Pavimentación en Concreto');

            // -----------------------------------------------------
            // RECLAMOS RECURRENTES (Con filtros dinámicos)
            // -----------------------------------------------------
            const renderReclamos = () => {
                reclamosLayer.clearLayers();
                if(!reclamosData) return;

                const fMes = document.getElementById('filter-mes').value;
                const fTipo = document.getElementById('filter-tipo').value;
                const fSubTipo = document.getElementById('filter-subtipo').value;
                const fDNI = document.getElementById('filter-dni').value.trim().toLowerCase();

                L.geoJSON(reclamosData, {
                    filter: function(feature) {
                        const props = feature.properties;
                        
                        // Filter by DNI
                        if (fDNI !== '' && (!props.DNI || !props.DNI.toString().toLowerCase().includes(fDNI))) {
                            return false;
                        }

                        // Check if AT LEAST ONE history item matches all active dropdown filters
                        if (fMes === 'ALL' && fTipo === 'ALL' && fSubTipo === 'ALL') return true;

                        const historial = props.Detalle_Historial || [];
                        const matchesHistorial = historial.some(h => {
                            const mesMatch = (fMes === 'ALL' || (h.Fecha && h.Fecha.startsWith(fMes)));
                            const tipoMatch = (fTipo === 'ALL' || h.Tipo === fTipo);
                            const subTipoMatch = (fSubTipo === 'ALL' || h.SubTipo === fSubTipo);
                            return mesMatch && tipoMatch && subTipoMatch;
                        });

                        return matchesHistorial;
                    },
                    pointToLayer: function(feature, latlng) {
                        return L.marker(latlng, { icon: getLeafletIcon('#E11D48', pathReclamo) }); // Rose/Red for alerts
                    },
                    onEachFeature: function(feature, layer) {
                        const props = feature.properties;
                        const hist = props.Detalle_Historial || [];
                        
                        let histHtml = '<div class="max-h-[120px] overflow-y-auto mt-2 space-y-2 pr-1 custom-scrollbar">';
                        hist.forEach(h => {
                            histHtml += `
                                <div class="bg-[#F3F6F9] p-2 rounded border border-[#E6EDF3] text-[10px]">
                                    <p class="font-bold text-[#0F172A] leading-tight">${h.SubTipo || 'S/D'}</p>
                                    <p class="text-[#64748B]">${h.Tipo || 'S/D'}</p>
                                    <p class="text-[#0B5F8D] font-semibold mt-1"><i data-lucide="calendar" class="h-3 w-3 inline"></i> ${h.Fecha || 'S/D'}</p>
                                </div>
                            `;
                        });
                        histHtml += '</div>';

                        let content = `
                            <div class="font-sans min-w-[220px] relative">
                                <button onclick="window.closeInfoWindow()" class="custom-close-btn">&times;</button>
                                <h4 class="font-bold border-b border-[#E6EDF3] pb-1 mb-2 pr-6 text-[#E11D48]">Reclamos Recurrentes</h4>
                                <div class="p-2 rounded-md mb-2 bg-[#FFE4E6] border border-[#FECDD3]">
                                    <p class="text-xs font-bold uppercase text-[#E11D48]">Vecino/a</p>
                                    <p class="text-sm font-extrabold text-[#9F1239]">${props.Vecino || 'S/D'}</p>
                                </div>
                                <ul class="text-xs text-[#64748B] space-y-1 mt-1">
                                    <li><b class="capitalize text-[#0F172A]">DNI:</b> ${props.DNI || '-'}</li>
                                    <li><b class="capitalize text-[#0F172A]">Dirección:</b> ${props.Direccion || '-'}</li>
                                    <li><b class="capitalize text-[#0F172A]">Total Reclamos:</b> ${props.Total_Reclamos_Zona || 0}</li>
                                </ul>
                                ${histHtml}
                            </div>`;
                        
                        layer.bindPopup(content);
                        layer.on('click', () => {
                            zoomToCgmBounds();
                            setTimeout(() => lucide.createIcons(), 50); // Re-render icons inside popup
                        });
                    }
                }).addTo(reclamosLayer);
            };

            fetch('./recurrentes_Turdera.geojson').then(r => r.json()).then(data => {
                reclamosData = data;
                
                const setMeses = new Set();
                const setTipos = new Set();
                const setSubTipos = new Set();

                data.features.forEach(f => {
                    const historial = f.properties.Detalle_Historial || [];
                    historial.forEach(h => {
                        if(h.Fecha) {
                            const mesAnio = h.Fecha.substring(0, 7); // "YYYY-MM"
                            setMeses.add(mesAnio);
                        }
                        if(h.Tipo) setTipos.add(h.Tipo);
                        if(h.SubTipo) setSubTipos.add(h.SubTipo);
                    });
                });

                // Populate selects
                const popSelect = (id, set) => {
                    const el = document.getElementById(id);
                    Array.from(set).sort().reverse().forEach(v => { // Reverse for descending dates
                        const opt = document.createElement('option');
                        opt.value = v;
                        opt.textContent = v;
                        el.appendChild(opt);
                    });
                };
                
                popSelect('filter-mes', setMeses);
                
                const sortAndPop = (id, set) => {
                    const el = document.getElementById(id);
                    Array.from(set).sort().forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v;
                        opt.textContent = v;
                        el.appendChild(opt);
                    });
                }
                sortAndPop('filter-tipo', setTipos);
                sortAndPop('filter-subtipo', setSubTipos);

                renderReclamos();
            }).catch(e => console.log('Error loading reclamos:', e));

            // Attach listeners to filters
            ['filter-mes', 'filter-tipo', 'filter-subtipo'].forEach(id => {
                document.getElementById(id).addEventListener('change', renderReclamos);
            });
            document.getElementById('filter-dni').addEventListener('input', renderReclamos);

            // Gestión Territorial (Barrenderos con colores y filtro)
            const renderBarrenderos = (filtroVal) => {
                barrenderosLayer.clearLayers();
                if(!barrenderosData) return;

                L.geoJSON(barrenderosData, {
                    filter: function(feature) {
                        if (filtroVal === 'ALL') return true;
                        const b = (feature.properties.BARRENDERO || 'Sin asignar').trim();
                        return b === filtroVal;
                    },
                    style: function(feature) {
                        const b = (feature.properties.BARRENDERO || 'Sin asignar').trim();
                        const colorHex = barrenderosColorMap[b] || '#19567C';
                        return { color: colorHex, weight: 4, opacity: 0.9 };
                    },
                    onEachFeature: function(feature, layer) {
                        const props = feature.properties;
                        const b = (props.BARRENDERO || 'Sin asignar').trim();
                        const colorHex = barrenderosColorMap[b] || '#19567C';

                        let content = `
                            <div class="font-sans min-w-[200px] relative">
                                <button onclick="window.closeInfoWindow()" class="custom-close-btn">&times;</button>
                                <h4 class="font-bold border-b border-[#E6EDF3] pb-1 mb-2 pr-6" style="color: ${colorHex}">Zona de Barrido</h4>
                                <div class="p-2 rounded-md mb-2" style="background-color: ${colorHex}15; border: 1px solid ${colorHex}40;">
                                    <p class="text-xs font-bold uppercase" style="color: ${colorHex}">Barrendero</p>
                                    <p class="text-lg font-extrabold" style="color: ${colorHex}">${b}</p>
                                </div>
                                <ul class="text-xs text-[#64748B] space-y-1 mt-1">
                                    <li><b class="capitalize text-[#0F172A]">Calle/Tramo:</b> ${props.CALLE || '-'}</li>
                                    <li><b class="capitalize text-[#0F172A]">Legajo/DNI:</b> ${props['LEGAJO/DNI'] || 'S/D'}</li>
                                </ul>
                            </div>`;
                        layer.bindPopup(content);
                        layer.on('click', zoomToCgmBounds);
                    }
                }).addTo(barrenderosLayer);
            };

            fetch('./zona_barrenderos_Turdera.geojson').then(r => r.json()).then(data => {
                barrenderosData = data;
                const setNombres = new Set();
                data.features.forEach(f => {
                    setNombres.add((f.properties.BARRENDERO || 'Sin asignar').trim());
                });

                const selectEl = document.getElementById('select-barrendero');
                let cIdx = 0;
                
                Array.from(setNombres).sort().forEach(b => {
                    barrenderosColorMap[b] = paletaAzules[cIdx % paletaAzules.length];
                    cIdx++;
                    
                    const opt = document.createElement('option');
                    opt.value = b;
                    opt.textContent = b;
                    selectEl.appendChild(opt);
                });

                renderBarrenderos('ALL');
            }).catch(e => console.log('Error loading barrenderos:', e));

            document.getElementById('select-barrendero').addEventListener('change', (e) => {
                renderBarrenderos(e.target.value);
            });

            // Espacios Públicos
            cargarCapaPuntos('./plazas_Turdera.geojson', plazasLayer, '#10B981', pathPlaza, '#10B981', 'Plaza');
            cargarCapaPuntos('./parques_municipales_Turdera.geojson', parquesLayer, '#059669', pathPlaza, '#059669', 'Parque Municipal');
            cargarCapaPuntos('./potreros_Turdera.geojson', potrerosLayer, '#F59E0B', pathClubes, '#F59E0B', 'Potrero');

            // Seguridad
            cargarCapaPuntos('./Camaras_Turdera.geojson', camarasLayer, '#8B5CF6', pathCamara, '#8B5CF6', 'Cámara de Seguridad');
            cargarCapaPuntos('./alarmas_Turdera.geojson', alarmasLayer, '#F59E0B', pathAlarma, '#F59E0B', 'Alarma Comunitaria');
            cargarCapaPuntos('./seguridad_Turdera.geojson', comisariasLayer, '#10B981', pathComisaria, '#10B981', 'Comisaría');
            cargarCapaPuntos('./lpr_Turdera.geojson', lprLayer, '#4F46E5', pathLpr, '#4F46E5', 'LPR (Lector de Patentes)');

            // Instituciones
            cargarCapaPuntos('./asociaciones_civiles_Turdera.geojson', asocCivilesLayer, '#3B82F6', pathAsoc, '#3B82F6', 'Asociación Civil');
            cargarCapaPuntos('./centro_de_jubilados_Turdera.geojson', jubiladosLayer, '#14B8A6', pathJubilados, '#14B8A6', 'Centro de Jubilados');
            cargarCapaPuntos('./Centros_culturales_Turdera.geojson', culturalesLayer, '#F43F5E', pathCulturales, '#F43F5E', 'Centro Cultural');
            cargarCapaPuntos('./Clubes_deportivos_Turdera.geojson', clubesLayer, '#0EA5E9', pathClubes, '#0EA5E9', 'Club Deportivo');
            cargarCapaPuntos('./Comedores_Turdera.geojson', comedoresLayer, '#EAB308', pathComedores, '#EAB308', 'Comedor');
            cargarCapaPuntos('./establecimientos_educativos_Turdera.geojson', educacionLayer, '#2563EB', pathEducacion, '#2563EB', 'Establecimiento Educativo');
            cargarCapaPuntos('./fundaciones_Turdera.geojson', fundacionesLayer, '#D946EF', pathFundaciones, '#D946EF', 'Fundación');
            cargarCapaPuntos('./iglesias_Turdera.geojson', iglesiasLayer, '#8B5CF6', pathIglesias, '#8B5CF6', 'Iglesia');
            cargarCapaPuntos('./Centros_de_atencion_sanitaria_Turdera.geojson', saludLayer, '#10B981', pathSalud, '#10B981', 'Centro de Salud');
            cargarCapaPuntos('./sociedades_de_fomento_Turdera.geojson', fomentoLayer, '#06B6D4', pathFomento, '#06B6D4', 'Sociedad de Fomento');

            // --- CHECKBOXES TOGGLES ---
            document.getElementById('cb-limite').addEventListener('change', (e) => {
                e.target.checked ? map.addLayer(limiteElements) : map.removeLayer(limiteElements);
            });

            const toggleLayer = (id, layerInstance) => {
                const el = document.getElementById(id);
                if(el) {
                    el.addEventListener('change', (e) => {
                        e.target.checked ? map.addLayer(layerInstance) : map.removeLayer(layerInstance);
                    });
                }
            };

            // Demografía
            toggleLayer('cb-poblacion', poblacionLayer);
            toggleLayer('cb-pobreza', pobrezaLayer);
            toggleLayer('cb-escolaridad', escolaridadLayer);
            toggleLayer('cb-ind-salud', indSaludLayer);

            toggleLayer('cb-plazas', plazasLayer);
            toggleLayer('cb-parques', parquesLayer);
            toggleLayer('cb-potreros', potrerosLayer);

            // Infraestructura y Planeamiento
            toggleLayer('cb-bacheo-2024', bacheo2024Layer);
            toggleLayer('cb-bacheo-2025', bacheo2025Layer);
            toggleLayer('cb-bacheo-2026', bacheo2026Layer);
            toggleLayer('cb-bacheo-concreto', bacheoConcretoLayer);
            toggleLayer('cb-bacheo-frio', bacheoFrioLayer);
            toggleLayer('cb-pavimentacion-concreto', pavimentacionConcretoLayer);

            // Infraestructura Vial
            const cbCallejero = document.getElementById('cb-callejero');
            const selectPavimento = document.getElementById('select-pavimento');
            if(cbCallejero) {
                cbCallejero.addEventListener('change', (e) => {
                    if(e.target.checked) {
                        map.addLayer(callejeroLayer);
                        selectPavimento.classList.remove('hidden');

                        map.removeLayer(callejeroLayer);
                        selectPavimento.classList.add('hidden');

            toggleLayer('cb-semaforos', semaforosLayer);
            toggleLayer('cb-reductores', reductoresLayer);
            toggleLayer('cb-solicitudes', solicitudesLayer);
            toggleLayer('cb-limite-cgm', limiteCgmLayer);
            toggleLayer('cb-barrios-populares', barriosPopularesLayer);

            // Gestión Territorial
            const cbBarrenderos = document.getElementById('cb-barrenderos');
            const selectBarrendero = document.getElementById('select-barrendero');
            if(cbBarrenderos) {
                cbBarrenderos.addEventListener('change', (e) => {
                    if(e.target.checked) {
                        map.addLayer(barrenderosLayer);
                        selectBarrendero.classList.remove('hidden');
                    } else {
                        map.removeLayer(barrenderosLayer);
                        selectBarrendero.classList.add('hidden');
                    }
                });
            }
            
            // Reclamos
            const cbReclamos = document.getElementById('cb-reclamos');
            const filtrosReclamos = document.getElementById('filtros-reclamos');
            if(cbReclamos) {
                cbReclamos.addEventListener('change', (e) => {
                    if(e.target.checked) {
                        map.addLayer(reclamosLayer);
                        filtrosReclamos.classList.remove('hidden');
                        filtrosReclamos.classList.add('flex');
                    } else {
                        map.removeLayer(reclamosLayer);
                        filtrosReclamos.classList.add('hidden');
                        filtrosReclamos.classList.remove('flex');
                    }
                });
            }

            // Seguridad
            toggleLayer('cb-camaras', camarasLayer);
            toggleLayer('cb-alarmas', alarmasLayer);
            toggleLayer('cb-comisarias', comisariasLayer);
            toggleLayer('cb-lpr', lprLayer);
            
            // Instituciones
            toggleLayer('cb-asoc-civiles', asocCivilesLayer);
            toggleLayer('cb-jubilados', jubiladosLayer);
            toggleLayer('cb-culturales', culturalesLayer);
            toggleLayer('cb-clubes', clubesLayer);
            toggleLayer('cb-comedores', comedoresLayer);
            toggleLayer('cb-educacion', educacionLayer);
            toggleLayer('cb-fundaciones', fundacionesLayer);
            toggleLayer('cb-iglesias', iglesiasLayer);
            toggleLayer('cb-salud', saludLayer);
            toggleLayer('cb-fomento', fomentoLayer);
        }

        document.addEventListener("DOMContentLoaded", initMap);
    </script>
</body>
</html>
